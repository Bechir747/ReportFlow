<!DOCTYPE html>

<html lang="en"><head>

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.background');
        }
        .soft-shadow {
            box-shadow: 0px 10px 15px -3px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-surface-container-low text-on-surface p-margin-mobile md:p-margin-desktop">
<!-- Main Content Area -->
<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-xl soft-shadow p-xl flex flex-col gap-lg z-10 relative">
<!-- Header / Branding -->
<header class="text-center flex flex-col gap-xs items-center">
<div class="h-12 w-12 bg-primary rounded-lg flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings: 'FILL' 1;">
                    flowsheet
                 </span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">ReportFlow</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enterprise Workflow</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">
                        mail
                    </span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/10 font-body-md text-body-md text-on-surface transition-colors placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">
                        lock
                    </span>
<input class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded focus:border-primary focus:ring-2 focus:ring-primary/10 font-body-md text-body-md text-on-surface transition-colors placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-3 px-4 rounded transition-colors flex justify-center items-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">
                    arrow_forward
                </span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-3 w-full">
<div class="h-px bg-outline-variant flex-1"></div>
<span class="font-label-md text-label-md text-outline">OR</span>
<div class="h-px bg-outline-variant flex-1"></div>
</div>
<!-- SSO Button (Optional, typical for enterprise) -->
<button class="w-full bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-highest text-on-surface font-label-md text-label-md py-3 px-4 rounded transition-colors flex justify-center items-center gap-2" type="button">
<span class="material-symbols-outlined text-sm text-outline" style="font-variation-settings: 'FILL' 0;">
                key
            </span>
            Sign in with SSO
        </button>
</main>
<!-- Footer Links -->
<footer class="mt-xl flex gap-md justify-center w-full max-w-md">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span class="text-outline-variant">•</span>
<a class="font-body-md text-body-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
</footer>
</body></html>
